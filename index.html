<!<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eid Mubarak</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height:100vh;
      overflow:hidden;
    }

    /* Poster Background */

    .poster{
      width:100%;
      height:100vh;
      background:url("eid.jpg") center/cover no-repeat;
      position:relative;
      transition:0.4s;
    }

    /* Background Blur */

    .poster.blur{
      filter:blur(8px);
      transform:scale(1.05);
    }

    /* Dark Overlay */

    .overlay{
      position:absolute;
      inset:0;
      background:rgba(0,0,0,0.25);
    }

    /* Button Position */

    .content{
      position:absolute;
      top:72%;
      left:50%;
      transform:translate(-50%,-50%);
      z-index:2;
      text-align:center;
    }

    /* Button Style */

    button{
      padding:14px 38px;
      border:none;
      border-radius:50px;
      background:#FFD700;
      color:black;
      font-size:20px;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
      box-shadow:0 0 20px gold;
    }

    button:hover{
      transform:scale(1.08);
    }

    /* Popup */

    .popup{
      position:fixed;
      inset:0;
      display:flex;
      justify-content:center;
      align-items:center;
      background:rgba(0,0,0,0.35);

      opacity:0;
      pointer-events:none;

      transition:0.4s;

      z-index:10;
    }

    .popup.show{
      opacity:1;
      pointer-events:auto;
    }

    /* Popup Box */

    .box{
      width:85%;
      max-width:350px;

      background:rgba(255,255,255,0.12);

      backdrop-filter:blur(15px);

      border:1px solid rgba(255,255,255,0.2);

      padding:30px;

      border-radius:25px;

      text-align:center;

      color:white;

      animation:popup 0.5s ease;

      box-shadow:0 0 25px rgba(0,0,0,0.4);
    }

    .box h2{
      margin-bottom:15px;
      color:#FFD700;
    }

    .box p{
      font-size:20px;
      line-height:1.6;
    }

    .number{
      margin-top:20px;
      color:#90EE90;
      font-size:20px;
      font-weight:bold;
      line-height:1.8;
    }

    /* Close Button */

    .close{
      margin-top:25px;
      padding:10px 25px;
      border:none;
      border-radius:30px;
      background:white;
      color:black;
      font-weight:bold;
      cursor:pointer;
    }

    @keyframes popup{

      from{
        transform:scale(0.7);
        opacity:0;
      }

      to{
        transform:scale(1);
        opacity:1;
      }

    }

  </style>
</head>

<body>

  <!-- Poster -->

  <div class="poster" id="poster">

    <div class="overlay"></div>

    <!-- Button -->

    <div class="content">

      <button onclick="showMessage()">
        Press Here
      </button>

    </div>

  </div>

  <!-- Popup -->

  <div class="popup" id="popup">

    <div class="box">

      <h2>😹 Eid Salami Needed</h2>

      <p>
        আপনি সেই লোক না যে আমাকে ঈদের সালামি দিবেন? 🤲✨
      </p>

      <div class="number">

        📱 bKash/Nagad: 01306522000

      </div>

      <button class="close" onclick="closePopup()">
        Close
      </button>

    </div>

  </div>

  <script>

    function showMessage(){

      document
      .getElementById("popup")
      .classList.add("show");

      document
      .getElementById("poster")
      .classList.add("blur");

    }

    function closePopup(){

      document
      .getElementById("popup")
      .classList.remove("show");

      document
      .getElementById("poster")
      .classList.remove("blur");

    }

  </script>

</body>
</html>
